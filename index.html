<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preencher formulários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Preencher formulários</h1>

    <table id="tabela-conteudo">
        <tr>
            <th>Item</th>
            <th>Descrição</th>
        </tr>
        <tr>
            <td>Dados</td>
            <td>Exemplo</td>
        </tr>
    </table>

    <form id="meuFormulario">
        <h2>Entre Contato com a Webgenium</h2>
        <p>Preencha o formulário abaixo para falar com nossa equipe de atendimento.</p>

        <label>* Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>

        <label>* E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required>

        <label>Telefone</label>
        <input type="tel" id="telefone" placeholder="(DDD) 99999-9999">

        <label>* Mensagem</label>
        <textarea id="texto-mensagem" placeholder="Sua mensagem aqui..." required></textarea>

        <button type="submit">ENVIAR</button>
    </form>
    
    <p id="mensagem-status"></p>

    <script src="script.js"></script>
</body>
</html>
